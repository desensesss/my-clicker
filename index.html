<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Fantasy RPG</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #121216;
      --card-bg: #1a1a24;
      --text-color: #e2e2e9;
      --accent-color: #7b2cbf;
      --accent-hover: #9d4edd;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
    }

    /* Верхняя панель со статусом */
    .status-bar {
      display: flex;
      justify-content: space-between;
      background: var(--card-bg);
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      border: 1px solid #2d2d3d;
      margin-bottom: 16px;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .status-val {
      font-weight: bold;
      color: var(--accent-hover);
    }

    /* Главный экран квеста */
    .quest-container {
      flex-grow: 1;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid #2d2d3d;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      margin-bottom: 16px;
      overflow-y: auto;
    }

    .story-text {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* Кнопки выбора */
    .choices-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background-color: #242433;
      color: var(--text-color);
      border: 1px solid #3d3d52;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .choice-btn:hover {
      background-color: var(--accent-color);
      border-color: var(--accent-hover);
    }

    /* Кнопка доната (в будущем для Звёзд) */
    .donate-btn {
      background: linear-gradient(135deg, #ffaa00, #ff5500);
      color: #fff;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Статус игрока -->
  <div class="status-bar">
    <div class="status-item">
      <span>❤️ Здоровье</span>
      <span class="status-val" id="hp-val">100/100</span>
    </div>
    <div class="status-item">
      <span>🔥 Факелы</span>
      <span class="status-val" id="energy-val">20/20</span>
    </div>
    <div class="status-item">
      <span>💰 Золото</span>
      <span class="status-val" id="gold-val">0</span>
    </div>
  </div>

  <!-- Окно истории -->
  <div class="quest-container">
    <div class="story-text" id="story-display">
      Вы стоите на пороге Проклятого Склепа. Ветер доносит запах сырости и древней магии. Из темноты доносится странный шорох... Что вы предпримете?
    </div>

    <!-- Варианты действий -->
    <div class="choices-container" id="choices-display">
      <button class="choice-btn" onclick="goToScene('crypt_inside')">🚪 Войти внутрь (-1 факел)</button>
      <button class="choice-btn" onclick="goToScene('search_camp')">🔍 Обыскать заброшенный лагерь рядом</button>
    </div>
  </div>

  <!-- Нижняя панель для быстрых покупок -->
  <div style="text-align: center;">
    <button class="donate-btn" onclick="buyEnergy()">⭐ Купить 5 Факелов (за Звёзды)</button>
  </div>

  <script>
    // Инициализация Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    // Состояние игрока
    let player = {
      hp: 100,
      energy: 20,
      gold: 0
    };

    // База данных локаций и сцен
    const story = {
      start: {
        text: "Вы стоите на пороге Проклятого Склепа. Ветер доносит запах сырости и древней магии. Из темноты доносится странный шорох...",
        choices: [
          { text: "🚪 Войти внутрь (-1 факел)", action: () => { player.energy -= 1; goToScene('crypt_inside'); } },
          { text: "🔍 Обыскать заброшенный лагерь рядом", action: () => goToScene('search_camp') }
        ]
      },
      crypt_inside: {
        text: "Внутри склепа кромешная тьма. Ваш факел едва освещает сырые стены. Вдруг перед вами вырастает полуразрушенный саркофаг, опутанный цепями.",
        choices: [
          { text: "⚔️ Сорвать цепи и открыть его", action: () => { player.gold += 50; goToScene('loot_found'); } },
          { text: "↩️ Вернуться к выходу", action: () => goToScene('start') }
        ]
      },
      search_camp: {
        text: "В лагере пусто, но под старыми шкурами вы находите кошель с парой монет! Правда, вы знатно исцарапали руки о ржавые гвозди.",
        choices: [
          { text: "Забрать добычу (+10 золота, -10 HP)", action: () => { player.gold += 10; player.hp -= 10; goToScene('start'); } }
        ]
      },
      loot_found: {
        text: "Саркофаг поддался! Внутри вы нашли древние сокровища. Вы богаты, но проклятие этого места теперь тяготеет над вами...",
        choices: [
          { text: "🔄 Начать приключение сначала", action: () => { player.hp = 100; player.energy = 20; player.gold = 0; goToScene('start'); } }
        ]
      }
    };

    // Функция обновления интерфейса
    function updateUI() {
      document.getElementById('hp-val').innerText = player.hp + "/100";
      document.getElementById('energy-val').innerText = player.energy + "/20";
      document.getElementById('gold-val').innerText = player.gold;
    }

    // Функция перехода по сценам
    function goToScene(sceneKey) {
      const scene = story[sceneKey];
      document.getElementById('story-display').innerText = scene.text;
      
      const choicesDiv = document.getElementById('choices-display');
      choicesDiv.innerHTML = ''; // Очищаем старые кнопки
      
      scene.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice.text;
        btn.onclick = () => {
          choice.action();
          updateUI();
        };
        choicesDiv.appendChild(btn);
      });
      updateUI();
    }

    // Тестовая функция покупки энергии
    function buyEnergy() {
      tg.showPopup({
        title: 'Покупка энергии',
        message: 'Здесь будет открываться официальный счёт Telegram Stars на покупку факелов.',
        buttons: [{type: 'ok', text: 'Понятно'}]
      });
    }

    // Первичный запуск
    updateUI();
  </script>
</body>
</html>
