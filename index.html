<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grim Crypt RPG</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-color: #121216;
      --card-bg: #1a1a24;
      --text-color: #e2e2e9;
      --accent-color: #7b2cbf;
      --accent-hover: #9d4edd;
      --border-color: #2d2d3d;
    }

    :root[data-theme="light"] {
      --bg-color: #f4f4f9;
      --card-bg: #ffffff;
      --text-color: #1c1c24;
      --accent-color: #0077b6;
      --accent-hover: #00b4d8;
      --border-color: #dcdce6;
    }

    :root[data-theme="ebon"] {
      --bg-color: #050507;
      --card-bg: #0d0d11;
      --text-color: #a3a3b2;
      --accent-color: #3a0ca3;
      --accent-hover: #7209b7;
      --border-color: #1a1a26;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }

    .settings-panel {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }

    .settings-panel select, .settings-panel button {
      background: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: var(--card-bg);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      border: 1px solid var(--border-color);
      margin-bottom: 10px;
    }

    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .status-val {
      font-weight: bold;
      color: var(--accent-hover);
      margin-top: 4px;
    }

    .inventory-bar {
      background: var(--card-bg);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      border: 1px dashed var(--border-color);
      margin-bottom: 12px;
      text-align: center;
      color: #a3a3b2;
    }

    .quest-container {
      flex-grow: 1;
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      margin-bottom: 16px;
      overflow-y: auto;
    }

    .story-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 20px;
      white-space: pre-line;
    }

    .enemy-hp-box {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid #ff3333;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
      color: #ff5555;
      display: none;
    }

    .choices-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .choice-btn {
      background-color: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .choice-btn:hover {
      background-color: var(--accent-color);
      border-color: var(--accent-hover);
      color: #ffffff;
    }

    .donate-btn {
      background: linear-gradient(135deg, #ffaa00, #ff5500);
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(255, 85, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="settings-panel">
    <select id="lang-select" onchange="changeLanguage(this.value)">
      <option value="ru">🇷🇺 Русский</option>
      <option value="en">🇺🇸 English</option>
      <option value="es">🇪🇸 Español</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="ga">🇮🇪 Gaeilge</option>
    </select>
    <button onclick="toggleTheme()">🎨 <span id="theme-btn-text">Сменить тему</span></button>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span id="label-hp">❤️ Здоровье</span>
      <span class="status-val" id="hp-val">100/100</span>
    </div>
    <div class="status-item">
      <span id="label-energy">🔥 Факелы</span>
      <span class="status-val" id="energy-val">20/20</span>
    </div>
    <div class="status-item">
      <span id="label-gold">💰 Золото</span>
      <span class="status-val" id="gold-val">0</span>
    </div>
  </div>

  <div class="inventory-bar" id="inventory-display"></div>

  <div class="quest-container">
    <div>
      <div class="enemy-hp-box" id="enemy-hp-box">
        <span id="enemy-name-label">💀 Скелет-Страж</span> HP: <span id="enemy-hp-val">50</span>
      </div>
      <div class="story-text" id="story-display"></div>
    </div>
    <div class="choices-container" id="choices-display"></div>
  </div>

  <div style="text-align: center;">
    <button class="donate-btn" id="donate-btn-text" onclick="buyEnergy()">⭐ Купить 5 Факелов (за Звёзды)</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const CURRENT_VERSION = "1.2"; // Обновили версию структуры данных

    let state = {
      version: CURRENT_VERSION,
      player: { hp: 100, energy: 20, gold: 0, inventory: [] },
      enemy: { hp: 0, maxHp: 50, active: false },
      currentScene: 'start',
      currentLang: 'ru',
      currentThemeIndex: 0,
      battleLog: '',
      campRollResult: null,
      chestOpened: false
    };

    const themes = ['dark', 'light', 'ebon'];

    const ui = {
      ru: { hp: "❤️ Здоровье", energy: "🔥 Факелы", gold: "💰 Золото", donate: "⭐ Купить 5 Факелов (за Звёзды)", theme: "Сменить тему", noEnergy: "У вас закончились факелы!", emptyInv: "🎒 Заплечный мешок пуст", invTitle: "🎒 Инвентарь: ", gameOver: "💀 Вы погибли в глубинах склепа... Авантюра окончена.", restartBtn: "🔄 Начать заново", enemyName: "💀 Скелет-Страж", keyItem: "🔑 Ключ от Сокровищницы", pouchItem: "🪙 Кошель", potionItem: "🧪 Зелье здоровья", successBuy: "Успешная покупка! +5 факелов." },
      en: { hp: "❤️ Health", energy: "🔥 Torches", gold: "💰 Gold", donate: "⭐ Buy 5 Torches (via Stars)", theme: "Change Theme", noEnergy: "Out of torches!", emptyInv: "🎒 Backpack is empty", invTitle: "🎒 Inventory: ", gameOver: "💀 You perished in the depths of the crypt...", restartBtn: "🔄 Restart", enemyName: "💀 Skeleton Guard", keyItem: "🔑 Treasury Key", pouchItem: "🪙 Old Pouch", potionItem: "🧪 Health Potion", successBuy: "Purchase successful! +5 torches." },
      es: { hp: "❤️ Salud", energy: "🔥 Antorchas", gold: "💰 Oro", donate: "⭐ Comprar 5 Antorchas", theme: "Cambiar Tema", noEnergy: "¡Sin antorchas!", emptyInv: "🎒 Mochila vacía", invTitle: "🎒 Inventario: ", gameOver: "💀 Has perecido en las profundidades...", restartBtn: "🔄 Reiniciar", enemyName: "💀 Esqueleto Guardián", keyItem: "🔑 Clave del Tesoro", pouchItem: "🪙 Bolsa Vieja", potionItem: "🧪 Poción de Salud", successBuy: "¡Compra con éxito! +5 antorchas." },
      de: { hp: "❤️ Gesundheit", energy: "🔥 Fackeln", gold: "💰 Gold", donate: "⭐ 5 Fackeln kaufen", theme: "Thema ändern", noEnergy: "Keine Fackeln mehr!", emptyInv: "🎒 Rucksack ist leer", invTitle: "🎒 Inventar: ", gameOver: "💀 Du bist in den Tiefen der Krypta gestorben...", restartBtn: "🔄 Neu starten", enemyName: "💀 Skelettwächter", keyItem: "🔑 Tresorschlüssel", pouchItem: "🪙 Alter Beutel", potionItem: "🧪 Heiltrank", successBuy: "Kauf erfolgreich! +5 Fackeln." },
      fr: { hp: "❤️ Santé", energy: "🔥 Torches", gold: "💰 Or", donate: "⭐ Acheter 5 Torches", theme: "Changer de Thème", noEnergy: "Plus de torches !", emptyInv: "🎒 Le sac à dos est vide", invTitle: "🎒 Inventaire: ", gameOver: "💀 Vous avez péri dans les profondeurs...", restartBtn: "🔄 Recommencer", enemyName: "💀 Squelette Garde", keyItem: "🔑 Clé du Trésor", pouchItem: "🪙 Vieille Bourse", potionItem: "🧪 Potion de Santé", successBuy: "Achat réussi ! +5 torches." },
      ga: { hp: "❤️ Sláinte", energy: "🔥 Lóicéid", gold: "💰 Ór", donate: "⭐ Ceannaigh 5 Lóicéid", theme: "Athraigh Téama", noEnergy: "Gan lóicéid!", emptyInv: "🎒 Tá an mála folamh", invTitle: "🎒 Fardal: ", gameOver: "💀 Fuair tú bás i ndorchadas na huaimhe...", restartBtn: "🔄 Atosaigh", enemyName: "💀 Sclábhaí Cnámharlaigh", keyItem: "🔑 Eochair Taisce", pouchItem: "🪙 Sean-Spaga", potionItem: "🧪 Potion Sláinte", successBuy: "Ceannach rathúil! +5 lóicéid." }
    };

    const storyData = {
      start: {
        ru: { text: "Вы стоите на пороге Проклятого Склепа. Ветер доносит запах сырости. Из темноты доносится странный шорох...", choices: () => getStartChoices('ru') },
        en: { text: "You stand at the gates of the Cursed Crypt. The wind carries the scent of dampness. A strange rustling comes from the dark...", choices: () => getStartChoices('en') },
        es: { text: "Estás a las puertas de la Cripta Maldita. El viento trae olor a humedad. Un extraño crujido proviene de la oscuridad...", choices: () => getStartChoices('es') },
        de: { text: "Du stehst an den Toren der Verfluchten Krypta. Der Wind trägt den Geruch von Feuchtigkeit. Ein seltsames Rascheln...", choices: () => getStartChoices('de') },
        fr: { text: "Vous vous tenez aux portes de la Crypte Maudite. Le vent apporte une odeur d'humidité. Un étrange bruissement...", choices: () => getStartChoices('fr') },
        ga: { text: "Seasann tú ag geataí na hUaimhe Mallaithe. Beireann an ghaoth boladh na taise. Tagann fásach aisteach...", choices: () => getStartChoices('ga') }
      },
      search_camp: {
        ru: { text: () => getCampText('ru'), choices: () => getCampChoices('ru') },
        en: { text: () => getCampText('en'), choices: () => getCampChoices('en') },
        es: { text: () => getCampText('es'), choices: () => getCampChoices('es') },
        de: { text: () => getCampText('de'), choices: () => getCampChoices('de') },
        fr: { text: () => getCampText('fr'), choices: () => getCampChoices('fr') },
        ga: { text: () => getCampText('ga'), choices: () => getCampChoices('ga') }
      },
      crypt_inside: {
        ru: { text: () => getBattleText('ru'), choices: () => getBattleChoices('ru') },
        en: { text: () => getBattleText('en'), choices: () => getBattleChoices('en') },
        es: { text: () => getBattleText('es'), choices: () => getBattleChoices('es') },
        de: { text: () => getBattleText('de'), choices: () => getBattleChoices('de') },
        fr: { text: () => getBattleText('fr'), choices: () => getBattleChoices('fr') },
        ga: { text: () => getBattleText('ga'), choices: () => getBattleChoices('ga') }
      },
      win_scene: {
        ru: { text: "Враг разбит! В глубине зала вы обнаружили кованый сундук. Открыть его?", choices: [{ text: "👑 Открыть сундук", next: "open_chest" }] },
        en: { text: "Enemy defeated! In the depths of the hall, you find an iron chest. Open it?", choices: [{ text: "👑 Open chest", next: "open_chest" }] },
        es: { text: "¡Enemigo derrotado! Encuentras un cofre de hierro en las profundidades. ¿Abrirlo?", choices: [{ text: "👑 Abrir cofre", next: "open_chest" }] },
        de: { text: "Gegner besiegt! Du findest eine Eisentruhe. Öffnen?", choices: [{ text: "👑 Truhe öffnen", next: "open_chest" }] },
        fr: { text: "Ennemi vaincu ! Vous trouvez un coffre en fer. L'ouvrir ?", choices: [{ text: "👑 Ouvrir le coffre", next: "open_chest" }] },
        ga: { text: "Namhaid cloíte! Aimsíonn tú ciste iarainn. Oscail é?", choices: [{ text: "👑 Oscail an ciste", next: "open_chest" }] }
      },
      end_adventure: {
        ru: { text: () => getChestText('ru'), choices: [{ text: "🔄 Начать заново", next: "reset" }] },
        en: { text: () => getChestText('en'), choices: [{ text: "🔄 Restart", next: "reset" }] },
        es: { text: () => getChestText('es'), choices: [{ text: "🔄 Reiniciar", next: "reset" }] },
        de: { text: () => getChestText('de'), choices: [{ text: "🔄 Neu starten", next: "reset" }] },
        fr: { text: () => getChestText('fr'), choices: [{ text: "🔄 Recommencer", next: "reset" }] },
        ga: { text: () => getChestText('ga'), choices: [{ text: "🔄 Atosaigh", next: "reset" }] }
      }
    };

    function getStartChoices(lng) {
      const enterText = { ru: "🚪 Войти внутрь (-1 факел)", en: "🚪 Enter inside (-1 torch)", es: "🚪 Entrar (-1 antorcha)", de: "🚪 Eintreten (-1 Fackel)", fr: "🚪 Entrer à l'intérieur (-1 torche)", ga: "🚪 Téigh isteach (-1 lóicéad)" }[lng];
      
      let campText = { ru: "🔍 Обыскать лагерь рядом", en: "🔍 Search nearby camp", es: "🔍 Registrar el campamento", de: "🔍 Lager untersuchen", fr: "🔍 Fouiller le camp", ga: "🔍 Cuardaigh campa" }[lng];
      if (state.campRollResult !== null) {
        campText = { ru: "🔍 Осмотреть пустой лагерь", en: "🔍 Check empty camp", es: "🔍 Mirar campamento vacío", de: "🔍 Leeres Lager ansehen", fr: "🔍 Regarder le camp vide", ga: "🔍 Féach ar an gcampa folamh" }[lng];
      }

      return [
        { text: enterText, next: "crypt_inside" },
        { text: campText, next: "search_camp" }
      ];
    }

    function getCampText(lng) {
      if (state.campRollResult === null) {
        return { ru: "Вы аккуратно крадетесь по заброшенному лагерю...", en: "You carefully creep around the abandoned camp...", es: "Te deslizas por el campamento abandonado...", de: "Du schleichst durch das verlassene Lager...", fr: "Vous vous glissez dans le camp abandonné...", ga: "Sleamhnaíonn tú timpeall an champa tréigthe..." }[lng];
      }
      return state.battleLog;
    }

    function getCampChoices(lng) {
      if (state.campRollResult === null) {
        return [{ text: { ru: "🎲 Испытать удачу", en: "🎲 Try luck", es: "🎲 Probar suerte", de: "🎲 Glück versuchen", fr: "🎲 Tenter votre chance", ga: "🎲 Bain triail as" }[lng], next: "roll_camp" }];
      }
      return [{ text: { ru: "🚪 Вернуться к склепу", en: "🚪 Go back to crypt", es: "🚪 Volver a la cripta", de: "🚪 Zurück zur Krypta", fr: "🚪 Retourner à la crypte", ga: "🚪 Téigh ar ais go dtí uaimh" }[lng], next: "start" }];
    }

    function getBattleText(lng) {
      if (!state.battleLog) {
        return { ru: "Внутри склепа мрак. Из темноты материализуется Скелет-Страж! Начинается бой!", en: "It is pitch black inside. Out of the darkness, a Skeleton Guard appears!", es: "La oscuridad es total. ¡Un Esqueleto Guardián aparece!", de: "Drinnen ist es stockdunkel. Ein Skelettwächter erscheint!", fr: "Il fait un noir d'encre. Un Squelette Garde surgit !", ga: "Tá sé dubh thais thall. Sclábhaí Cnámharlaigh le feiceáil!" }[lng];
      }
      return state.battleLog;
    }

    function getBattleChoices(lng) {
      const choices = [
        { text: { ru: "⚔️ Нанести мощный удар", en: "⚔️ Strike with weapon", es: "⚔️ Atacar con fuerza", de: "⚔️ Angreifen", fr: "⚔️ Frapper", ga: "⚔️ Buail leis an arm" }[lng], next: "battle_turn" },
        { text: { ru: "🛡️ Закрыться щитом", en: "🛡️ Defend yourself", es: "🛡️ Defenderse", de: "🛡️ Blocken", fr: "🛡️ Se défendre", ga: "🛡️ Cosain tú féin" }[lng], next: "battle_block" }
      ];

      // Динамическая кнопка зелья: активна только при наличии предмета в инвентаре
      if (state.player.inventory.includes("potionItem")) {
        choices.push({
          text: { ru: "🧪 Выпить зелье (+30 HP)", en: "🧪 Drink potion (+30 HP)", es: "🧪 Beber poción (+30 HP)", de: "🧪 Trank trinken (+30 HP)", fr: "🧪 Boire la potion (+30 HP)", ga: "🧪 Ól potion (+30 HP)" }[lng],
          next: "use_potion"
        });
      }

      return choices;
    }

    function getChestText(lng) {
      if (state.chestOpened) {
        return { ru: "Используя ключ, вы открыли потайной замок! Внутри лежало массивное сокровище (+200 💰)!", en: "Using the key, you unlocked the chest! Huge treasure found (+200 💰)!", es: "¡Usando la clave, abriste el cofre! Gran tesoro encontrado (+200 💰)!", de: "Mit dem Schlüssel hast du die Truhe geöffnet! Riesiger Schatz gefunden (+200 💰)!", fr: "En utilisant la clé, vous avez ouvert the coffre ! Immense trésor trouvé (+200 💰)!", ga: "Ag baint úsáide as an eochair, d'oscail tú an ciste! Taisce ollmhór aimsithe (+200 💰)!" }[lng];
      }
      return { ru: "Ключа не было, пришлось сбивать замок камнем. Вы достали немного золота (+50 💰).", en: "No key found. You smashed the lock and got some gold (+50 💰).", es: "No se encontró clave. Rompiste el cerrojo y obtuviste algo de oro (+50 💰).", de: "Kein Schlüssel. Du hast das Schloss eingeschlagen (+50 💰).", fr: "Aucune clé. Vous avez brisé le cadenas (+50 💰).", ga: "Níor aimsíodh aon eochair. Bhris tú an glas (+50 💰)." }[lng];
    }

    let saveTimeout = null;
    function updateUI() {
      const lng = state.currentLang;
      
      // ИСПРАВЛЕНИЕ ЛОКАЛИЗАЦИИ ИНТЕРФЕЙСА (теперь переводится ВСЁ)
      document.getElementById('label-hp').innerText = ui[lng].hp;
      document.getElementById('label-energy').innerText = ui[lng].energy;
      document.getElementById('label-gold').innerText = ui[lng].gold;
      document.getElementById('donate-btn-text').innerText = ui[lng].donate;
      document.getElementById('theme-btn-text').innerText = ui[lng].theme;
      document.getElementById('enemy-name-label').innerText = ui[lng].enemyName;

      document.getElementById('hp-val').innerText = state.player.hp + "/100";
      document.getElementById('energy-val').innerText = state.player.energy + "/20";
      document.getElementById('gold-val').innerText = state.player.gold;

      const invDisplay = document.getElementById('inventory-display');
      if (state.player.inventory.length === 0) {
        invDisplay.innerText = ui[lng].emptyInv;
      } else {
        const translatedItems = state.player.inventory.map(item => ui[lng][item] || item);
        invDisplay.innerText = ui[lng].invTitle + translatedItems.join(', ');
      }

      const enemyBox = document.getElementById('enemy-hp-box');
      if (state.enemy.active) {
        enemyBox.style.display = 'block';
        document.getElementById('enemy-hp-val').innerText = state.enemy.hp;
      } else {
        enemyBox.style.display = 'none';
      }
      
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveToCloud();
      }, 1000);
    }

    function saveToCloud() {
      if (typeof tg.CloudStorage !== 'undefined' && tg.CloudStorage.setItem) {
        try {
          tg.CloudStorage.setItem('grim_crypt_state', JSON.stringify(state), (err, success) => {
            if (err) console.error("CloudStorage save error", err);
          });
        } catch (e) { console.error("CloudStorage execution error", e); }
      } else {
        localStorage.setItem('grim_crypt_state', JSON.stringify(state));
      }
    }

    function renderScene() {
      const lng = state.currentLang;
      if (state.player.hp <= 0) {
        document.getElementById('story-display').innerText = ui[lng].gameOver;
        const choicesDiv = document.getElementById('choices-display');
        choicesDiv.innerHTML = '';
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = ui[lng].restartBtn;
        btn.onclick = () => handleChoice('reset');
        choicesDiv.appendChild(btn);
        state.enemy.active = false;
        updateUI();
        return;
      }

      const scene = storyData[state.currentScene][lng];
      const textVal = typeof scene.text === 'function' ? scene.text(lng) : scene.text;
      const choicesVal = typeof scene.choices === 'function' ? scene.choices(lng) : scene.choices;

      document.getElementById('story-display').innerText = textVal;
      const choicesDiv = document.getElementById('choices-display');
      choicesDiv.innerHTML = '';
      
      choicesVal.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerText = choice.text;
        btn.onclick = () => handleChoice(choice.next);
        choicesDiv.appendChild(btn);
      });
      updateUI();
    }

    function handleChoice(nextScene) {
      const lng = state.currentLang;

      if (state.currentScene === 'start' && nextScene === 'search_camp' && state.campRollResult !== null) {
        state.battleLog = { 
          ru: "Здесь больше ничего нет. Вы уже обчистили этот лагерь.", 
          en: "There's nothing left here. You have already looted this camp.",
          es: "No queda nada aquí. Ya has saqueado este campamento.",
          de: "Hier ist nichts mehr übrig. Du hast dieses Lager geplündert.",
          fr: "Il ne reste plus rien ici. Vous avez déjà pillé ce camp.",
          ga: "Níl aon rud fágtha anseo. Rinne tú creach ar an gcampa seo cheana."
        }[lng];
      }

      if (state.currentScene === 'start' && nextScene === 'crypt_inside') {
        if (state.player.energy <= 0) { alert(ui[lng].noEnergy); return; }
        state.player.energy -= 1;
        state.enemy.hp = state.enemy.maxHp;
        state.enemy.active = true;
        state.battleLog = '';
      }

      // ОБНОВЛЕННЫЙ ЛУТ В ЛАГЕРЕ (Шансы на Зелье)
      if (nextScene === 'roll_camp' && state.campRollResult === null) {
        const roll = Math.random();
        state.campRollResult = roll;
        if (roll < 0.3) {
          state.player.gold += 30;
          state.player.inventory.push("pouchItem");
          state.battleLog = { ru: "Удача! Под старым настилом вы откопали старый кошель с золотом (+30 💰).", en: "Luck! Under the old floorboards you dug up an old pouch of gold (+30 💰).", es: "¡Suerte! Cavaste una vieja bolsa de oro (+30 💰).", de: "Glück! Du hast einen alten Beutel Gold ausgegraben (+30 💰).", fr: "Chance ! Vous avez déterré une vieille bourse d'or (+30 💰).", ga: "Rath! Thochail tú seanspaga óir (+30 💰)." }[lng];
        } else if (roll < 0.55) {
          state.player.hp = Math.max(0, state.player.hp - 20);
          state.battleLog = { ru: "Ловушка! Вы наступили на ржавый капкан (-20 HP).", en: "Trap! You stepped on a rusty bear trap (-20 HP).", es: "¡Trampa! Pisaste una trampa oxidada (-20 HP).", de: "Falle! Du bist in eine rostige Bärenfalle getreten (-20 HP).", fr: "Piège ! Vous avez marché sur un piège rouillé (-20 HP).", ga: "Gaiste! Shéid tú ar ghaiste meirgeach (-20 HP)." }[lng];
        } else if (roll < 0.8) {
          // ДОБАВЛЕНИЕ ЗЕЛЬЯ В ИНВЕНТАРЬ
          state.player.inventory.push("potionItem");
          state.battleLog = { ru: "В разбитом походном ящике вы нашли спасительное Зелье здоровья!", en: "In a broken supply crate you found a saving Health Potion!", es: "¡En una caja de suministros rota encontraste una Poción de Salud!", de: "In Kiste hast du einen rettenden Heiltrank gefunden!", fr: "Dans une caisse cassée, vous avez trouvé une Potion de Santé !", ga: "Aimsigh tú Potion Sláinte i mbosca briste!" }[lng];
        } else {
          state.player.inventory.push("keyItem");
          state.battleLog = { ru: "Вы нашли древний Ключ от Сокровищницы, покрытый светящимися рунами!", en: "You found an ancient Treasury Key covered in glowing runes!", es: "¡Encontraste una antigua clave del tesoro cubierta de runas!", de: "Du hast einen alten Tresorschlüssel gefunden, der mit Runen bedeckt ist!", fr: "Vous avez trouvé une clé du trésor antique couverte de runes !", ga: "Aimsigh tú eochair thaisce ársa clúdaithe le rúnanna!" }[lng];
        }
        nextScene = 'search_camp';
      }

      if (nextScene === 'battle_turn') {
        const dmgToEnemy = Math.floor(Math.random() * 11) + 18; 
        const dmgToPlayer = Math.floor(Math.random() * 7) + 6;   
        state.enemy.hp = Math.max(0, state.enemy.hp - dmgToEnemy);
        state.player.hp = Math.max(0, state.player.hp - dmgToPlayer);

        if (state.enemy.hp <= 0) {
          state.enemy.active = false;
          nextScene = 'win_scene';
        } else {
          state.battleLog = {
            ru: `⚔️ Вы нанесли мощный удар на ${dmgToEnemy} урона! Скелет контратаковал и ранил вас на ${dmgToPlayer} HP.`,
            en: `⚔️ You struck for ${dmgToEnemy} damage! The skeleton countered and hit you for ${dmgToPlayer} HP.`,
            es: `⚔️ ¡Atacaste por ${dmgToEnemy} de daño! El esqueleto contraatacó por ${dmgToPlayer} HP.`,
            de: `⚔️ Du hast ${dmgToEnemy} Schaden verursacht! Das Skelett konterte für ${dmgToPlayer} HP.`,
            fr: `⚔️ Vous avez infligé ${dmgToEnemy} dégâts ! Le squelette a riposté pour ${dmgToPlayer} HP.`,
            ga: `⚔️ Bhuail tú le haghaidh ${dmgToEnemy} damáiste! Ghabh an cnámharlach ar ais le haghaidh ${dmgToPlayer} HP.`
          }[lng];
          nextScene = 'crypt_inside';
        }
      }

      if (nextScene === 'battle_block') {
        const dmgToEnemy = Math.floor(Math.random() * 4) + 2;  
        const dmgToPlayer = Math.floor(Math.random() * 3);     
        state.enemy.hp = Math.max(0, state.enemy.hp - dmgToEnemy);
        state.player.hp = Math.max(0, state.player.hp - dmgToPlayer);

        if (state.enemy.hp <= 0) {
          state.enemy.active = false;
          nextScene = 'win_scene';
        } else {
          state.battleLog = {
            ru: `🛡️ Блок! Вы потеряли всего ${dmgToPlayer} HP и провели ответный выпад щитом на ${dmgToEnemy} урона.`,
            en: `🛡️ Block! You lost only ${dmgToPlayer} HP and bashed back with your shield for ${dmgToEnemy} damage.`,
            es: `🛡️ ¡Bloqueo! Perdiste solo ${dmgToPlayer} HP y golpeaste con el escudo por ${dmgToEnemy} de daño.`,
            de: `🛡️ Block! Du hast nur ${dmgToPlayer} HP verloren und mit dem Schild ${dmgToEnemy} Schaden ausgeteilt.`,
            fr: `🛡️ Bloc ! Vous n'avez perdu que ${dmgToPlayer} HP et avez frappé en retour pour ${dmgToEnemy} dégâts.`,
            ga: `🛡️ Cosaint! Níor chaill tú ach ${dmgToPlayer} HP agus bhuail tú ar ais le do sciath le haghaidh ${dmgToEnemy} damáiste.`
          }[lng];
          nextScene = 'crypt_inside';
        }
      }

      // ЛОГИКА ИСПОЛЬЗОВАНИЯ ЗЕЛЬЯ В БОЮ
      if (nextScene === 'use_potion') {
        const idx = state.player.inventory.indexOf("potionItem");
        if (idx !== -1) {
          state.player.inventory.splice(idx, 1); // Удаляем одно зелье
          state.player.hp = Math.min(100, state.player.hp + 30); // Лечим на 30 HP, но не выше 100
          
          state.battleLog = {
            ru: "🧪 Вы выпили зелье здоровья и восстановили +30 HP! Скелет-Страж замешкался и не успел атаковать.",
            en: "🧪 You drank a health potion and restored +30 HP! The Skeleton Guard hesitated and missed his turn.",
            es: "🧪 ¡Bebiste una poción y recuperaste +30 HP! El Esqueleto Guardián dudó.",
            de: "🧪 Du hast einen Heiltrank getrunken (+30 HP)! Das Skelett zögerte.",
            fr: "🧪 Vous avez bu une potion (+30 HP) ! Le Squelette a hésité.",
            ga: "🧪 D'ól tú potion sláinte (+30 HP)! Bhí an cnámharlach ag fanacht."
          }[lng];
        }
        nextScene = 'crypt_inside';
      }

      if (nextScene === 'open_chest') {
        if (state.player.inventory.includes("keyItem")) {
          state.player.gold += 200;
          state.chestOpened = true;
        } else {
          state.player.gold += 50;
          state.chestOpened = false;
        }
        nextScene = 'end_adventure';
      }

      if (nextScene === 'reset') {
        state.player = { hp: 100, energy: 20, gold: 0, inventory: [] };
        state.enemy = { hp: 0, maxHp: 50, active: false };
        state.campRollResult = null;
        state.battleLog = '';
        state.chestOpened = false;
        state.currentScene = 'start';
      } else {
        state.currentScene = nextScene;
      }

      renderScene();
    }

    function changeLanguage(lang) {
      state.currentLang = lang;
      renderScene();
    }

    function toggleTheme() {
      state.currentThemeIndex = (state.currentThemeIndex + 1) % themes.length;
      document.documentElement.setAttribute('data-theme', themes[state.currentThemeIndex]);
      updateUI();
    }

    function buyEnergy() {
      tg.showPopup({
        title: state.currentLang === 'ru' ? 'Тест транзакции Stars' : 'Stars Payment Simulation',
        message: state.currentLang === 'ru' ? 'Запустить тестовое начисление 5 факелов?' : 'Trigger a test addition of 5 torches?',
        buttons: [{type: 'ok', text: 'Зачислить'}, {type: 'cancel'}]
      }, (buttonId) => {
        if (buttonId === 'ok') {
          state.player.energy += 5;
          updateUI();
          tg.showAlert(ui[state.currentLang].successBuy);
        }
      });
    }

    function initGame() {
      if (typeof tg.CloudStorage !== 'undefined' && tg.CloudStorage.getItem) {
        try {
          tg.CloudStorage.getItem('grim_crypt_state', (err, savedData) => {
            if (!err && savedData) {
              parseAndApplyState(savedData);
            } else {
              renderScene();
            }
          });
        } catch (e) { 
          console.error("CloudStorage interface error, trying localStorage", e);
          loadFromLocalStorage();
        }
      } else {
        loadFromLocalStorage();
      }
    }

    function loadFromLocalStorage() {
      const localData = localStorage.getItem('grim_crypt_state');
      if (localData) {
        parseAndApplyState(localData);
      } else {
        renderScene();
      }
    }

    function parseAndApplyState(rawData) {
      try {
        const loadedState = JSON.parse(rawData);
        if (loadedState && loadedState.version === CURRENT_VERSION) {
          state = loadedState;
          document.getElementById('lang-select').value = state.currentLang;
          document.documentElement.setAttribute('data-theme', themes[state.currentThemeIndex]);
        } else {
          console.log("Old or invalid state version. Fresh game started.");
        }
      } catch(e) { console.error("Error parsing saved state", e); }
      renderScene();
    }

    initGame();
  </script>
</body>
</html>
