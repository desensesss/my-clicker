<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Telegram App</title>
    <!-- Подключаем официальный скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1f1f1f);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .score {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="score">Счет: <span id="score-counter">0</span></div>
    <button class="btn" id="click-btn">Кликни меня!</button>

    <script>
        // Инициализируем Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем приложение на весь экран

        let score = 0;
        const scoreCounter = document.getElementById('score-counter');
        const clickBtn = document.getElementById('click-btn');

        clickBtn.addEventListener('click', () => {
            score++;
            scoreCounter.innerText = score;
            
            // Легкая вибрация при клике (работает на смартфонах)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
